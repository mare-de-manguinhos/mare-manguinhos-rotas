services:
  # ── Backend (API REST) ──────────────────────────────────────
  - type: web
    name: mare-entregas-api
    env: node
    rootDir: app-entregas-back
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BEARER_TOKEN
        generateValue: true

  # ── Frontend (SPA estático) ─────────────────────────────────
  - type: web
    name: mare-entregas-app
    env: static
    rootDir: app-entregas-front
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BEARER_TOKEN
        fromService:
          name: mare-entregas-api
          type: web
          envVarKey: BEARER_TOKEN
      - key: VITE_API_URL
        sync: false
